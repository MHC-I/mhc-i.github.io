<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="./css/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '',
      repo: '',
      // 开启侧边栏 
      loadSidebar: true,
      sidebarDisplayLevel: 1,
      // 搜索
      search: {
        paths: 'auto',
        placeholder: '搜索🔍',
        noData: '什么都没有找到噢!',
        depth: 6
      },
      // 文档目录
      subMaxLevel:6,
      // 字数统计
      count:{
        countable:true,
        fontsize:'0.9em',
        color:'rgb(90,90,90)',
        language:'chinese'
      },
      // 设置文档名称
      name: 'A SURGEON.',
      //mermaid绘图
      mermaidConfig: {
        querySelector: ".mermaid"
      },
      //mermaid bug修复
      plugins: [
        function (hook) {
          hook.doneEach(function () {
            let mermaidConfig = {
              querySelector: ".mermaid",
            };
            mermaid.run(mermaidConfig);
          });
        },
      ],
      
    }
  
  </script>
  <!-- Docsify v4 -->
  <script src="./js/docsify.min.js"></script>
  <!-- 搜索 -->
  <script src="./js/search.min.js"></script>
  <!-- 代码复制按钮 -->
  <script src="./js/docsify-copy-code.min.js"></script>
  <!-- 字数统计 -->
  <script src="./js/countable.min.js"></script>
  <!-- 侧边栏折叠 -->
  <script src="./js/docsify-sidebar-collapse.min.js"></script>
  <!-- mermaid绘图 -->
  <script type="module">
    import mermaid from "./js/mermaid/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: true });
    window.mermaid = mermaid;
  </script>
  <script src="./js/docsify-mermaid.js"></script>
  <!-- PWA -->
  <script>
    if (typeof navigator.serviceWorker !== 'undefined') {
      navigator.serviceWorker.register('./js/sw.js')
    }
  </script>
</body>
</html>
